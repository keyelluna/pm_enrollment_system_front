<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="container_content_add">
            <h1>Add product</h1>
            <div class="form-container">
                <div id="form">
                    <label for="" >Student Name</label><br>
                    <input type="text"  class="mb-2" name="fullName" id="fullName" required><br>

                    <label for="" >Course</label><br>
                    <input type="text" name="course" id="course" required><br>

                    <label for="">Year Level</label><br>
                    <input type="number" class="mb-2" name="yearLevel" id="yearLevel" required><br>

                    <label for="">Email</label><br>
                    <input type="text" class="mb-2" name="email" id="email" required>
                </div>
            </div>
            <button class="addButton">Add Record</button>
            <button class="backButton">Back</button>
        </div>
    </div>

    <script src="./index.js"></script>
    <script>
        const backButton = document.querySelector(".backButton");

        backButton.addEventListener('click', () => {
            window.location.replace("index.html");
        })
    </script>
    
    
</body>
</html>
